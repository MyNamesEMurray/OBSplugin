name: Build

# CI validation runs on PRs only. A push to main is already validated (the
# PR built the identical code), and the release workflow rebuilds + ships
# the artifacts — so building again on the main push would be pure waste.
#
# PRs build only what they touch: a cheap `changes` job diffs the PR and
# the build jobs are if-gated per area — plugin-only PRs skip the iOS
# build, app-only PRs skip the three plugin builds, docs-only PRs skip
# everything. The plugin and the app share no build inputs (only the wire
# protocol spec in docs/), so the split is safe. (A `paths:` filter would
# be simpler but breaks required checks — the workflow never runs, so the
# checks sit "expected" forever and the PR can't merge. Skipped jobs count
# as passing.)
on:
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      plugin: ${{ steps.diff.outputs.plugin }}
      ios: ${{ steps.diff.outputs.ios }}
    steps:
      - uses: actions/checkout@v5

      - name: Diff against base
        id: diff
        env:
          BASE: ${{ github.event.pull_request.base.sha || '' }}
        run: |
          if [ -z "$BASE" ]; then
            # workflow_dispatch: build everything
            echo "plugin=true" >> "$GITHUB_OUTPUT"
            echo "ios=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --depth=1 origin "$BASE"
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          # A workflow edit rebuilds everything: it may change any job.
          if echo "$CHANGED" | \
             grep -qE '^(obs-plugin/|installer/|\.github/workflows/build\.yml)'; then
            echo "plugin=true" >> "$GITHUB_OUTPUT"
          else
            echo "plugin=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | \
             grep -qE '^(ios-app/|\.github/workflows/build\.yml)'; then
            echo "ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "ios=false" >> "$GITHUB_OUTPUT"
          fi
  obs-plugin-linux:
    name: OBS plugin (Linux)
    needs: changes
    if: needs.changes.outputs.plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libobs-dev qt6-base-dev \
            libavcodec-dev libavutil-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-Wall -Wextra -Werror"
        working-directory: obs-plugin

      - name: Build
        run: cmake --build build
        working-directory: obs-plugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v5
        with:
          name: lenslink-linux-x86_64
          path: |
            obs-plugin/build/lenslink.so
            obs-plugin/data/

  obs-plugin-windows:
    name: OBS plugin (Windows)
    needs: changes
    if: needs.changes.outputs.plugin == 'true'
    runs-on: windows-2022
    env:
      # Keep in sync with the OBS release users run: the plugin links the
      # FFmpeg DLLs from this deps bundle, and OBS must ship the same ones.
      # OBS 32.1.2 pins obs-deps 2025-08-23 (see its CMakePresets.json).
      OBS_REF: "32.1.2"
      DEPS_TAG: "2025-08-23"
    steps:
      - uses: actions/checkout@v5

      # No submodules here: cache-hit runs only need in-tree headers
      # (libobs/, deps/w32-pthreads/). The recursive fetch is minutes of
      # overhead, so it moves into the cache-miss build step below.
      - name: Checkout obs-studio (for libobs)
        uses: actions/checkout@v5
        with:
          repository: obsproject/obs-studio
          ref: ${{ env.OBS_REF }}
          path: obs-studio

      - name: Download OBS prebuilt dependencies (FFmpeg, Qt6)
        run: |
          curl -L -o deps.zip "https://github.com/obsproject/obs-deps/releases/download/${{ env.DEPS_TAG }}/windows-deps-${{ env.DEPS_TAG }}-x64.zip"
          7z x deps.zip -oobs-deps
          # Qt6 (same bundle OBS itself builds with): needed only for the
          # plugin's status-bar/dock UI. The plugin links Qt but resolves
          # obs-frontend-api symbols at runtime, so libobs alone still
          # suffices for the rest of the build.
          curl -L -o deps-qt6.zip "https://github.com/obsproject/obs-deps/releases/download/${{ env.DEPS_TAG }}/windows-deps-qt6-${{ env.DEPS_TAG }}-x64.zip"
          7z x -y deps-qt6.zip -oobs-deps

      - name: Cache libobs build
        id: cache-libobs
        uses: actions/cache@v5
        with:
          path: obs-build
          key: libobs-${{ env.OBS_REF }}-${{ env.DEPS_TAG }}

      - name: Build libobs
        if: steps.cache-libobs.outputs.cache-hit != 'true'
        run: |
          git -C obs-studio submodule update --init --recursive
          cmake -S obs-studio -B obs-build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}\obs-deps" `
            -DENABLE_UI=OFF -DENABLE_FRONTEND=OFF -DENABLE_PLUGINS=OFF `
            -DENABLE_BROWSER=OFF -DENABLE_SCRIPTING=OFF -DENABLE_WEBSOCKET=OFF `
            -DENABLE_AJA=OFF
          cmake --build obs-build --target libobs --config Release

      - name: Build plugin
        run: |
          cmake -S obs-plugin -B plugin-build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}\obs-deps" `
            -DLIBOBS_INCLUDE_DIR="${{ github.workspace }}\obs-studio\libobs;${{ github.workspace }}\obs-build\config;${{ github.workspace }}\obs-studio\deps\w32-pthreads" `
            -DLIBOBS_LIBRARY="${{ github.workspace }}\obs-build\libobs\Release\obs.lib;${{ github.workspace }}\obs-build\deps\w32-pthreads\Release\w32-pthreads.lib" `
            -DOBS_FRONTEND_API_HINT="${{ github.workspace }}\obs-studio\frontend\api;${{ github.workspace }}\obs-studio\UI\obs-frontend-api" `
            -DFFMPEG_INCLUDE_DIR="${{ github.workspace }}\obs-deps\include" `
            -DAVCODEC_LIBRARY="${{ github.workspace }}\obs-deps\lib\avcodec.lib" `
            -DAVUTIL_LIBRARY="${{ github.workspace }}\obs-deps\lib\avutil.lib"
          cmake --build plugin-build --config Release

      - name: Package (drop into C:\Program Files\obs-studio)
        run: |
          New-Item -ItemType Directory -Force -Path stage\obs-plugins\64bit | Out-Null
          New-Item -ItemType Directory -Force -Path stage\data\obs-plugins\lenslink | Out-Null
          Copy-Item plugin-build\Release\lenslink.dll stage\obs-plugins\64bit\
          Copy-Item -Recurse obs-plugin\data\* stage\data\obs-plugins\lenslink\

      # Compile the installer on PRs too, so a broken .iss can't reach a
      # release build. Takes seconds.
      - name: Build installer
        run: |
          if (-not (Get-Command iscc -ErrorAction SilentlyContinue)) {
            choco install innosetup -y --no-progress
          }
          iscc /DAppVersion=0.0.0 installer\windows\lenslink.iss

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v5
        with:
          name: lenslink-windows-x64
          path: |
            stage/
            LensLink-installer-windows-x64.exe

  obs-plugin-macos:
    name: OBS plugin (macOS)
    needs: changes
    if: needs.changes.outputs.plugin == 'true'
    runs-on: macos-15
    env:
      # Keep in sync with the OBS release users run (same pins as the
      # Windows job): the plugin links the FFmpeg dylibs from this deps
      # bundle, and OBS must ship the same ones.
      OBS_REF: "32.1.2"
      DEPS_TAG: "2025-08-23"
    steps:
      - uses: actions/checkout@v5

      # No submodules here: cache-hit runs only need in-tree headers
      # (libobs/). The recursive fetch is minutes of overhead, so it moves
      # into the cache-miss build step below.
      - name: Checkout obs-studio (for libobs)
        uses: actions/checkout@v5
        with:
          repository: obsproject/obs-studio
          ref: ${{ env.OBS_REF }}
          path: obs-studio

      - name: Download OBS prebuilt dependencies (FFmpeg, Qt6)
        run: |
          curl -L -o deps.tar.xz "https://github.com/obsproject/obs-deps/releases/download/${{ env.DEPS_TAG }}/macos-deps-${{ env.DEPS_TAG }}-universal.tar.xz"
          mkdir obs-deps
          tar -xJf deps.tar.xz -C obs-deps
          # Qt6 for the status-bar/dock UI (see the Windows job note).
          curl -L -o deps-qt6.tar.xz "https://github.com/obsproject/obs-deps/releases/download/${{ env.DEPS_TAG }}/macos-deps-qt6-${{ env.DEPS_TAG }}-universal.tar.xz"
          tar -xJf deps-qt6.tar.xz -C obs-deps

      # "macos" in the key: cache keys are not runner-scoped, and the
      # Windows job already uses libobs-<ref>-<tag> for its MSVC build.
      - name: Cache libobs build
        id: cache-libobs
        uses: actions/cache@v5
        with:
          path: obs-build
          key: libobs-macos-${{ env.OBS_REF }}-${{ env.DEPS_TAG }}

      # Xcode generator: obs-studio's macOS CMake requires it. Universal
      # (arm64 + x86_64) to match the deps bundle and the official OBS app.
      - name: Build libobs
        if: steps.cache-libobs.outputs.cache-hit != 'true'
        run: |
          git -C obs-studio submodule update --init --recursive
          # libobs-metal is a pure-Swift target added unconditionally on
          # macOS; without obs-studio's own presets the Swift language is
          # never enabled and CMake's generate step fails. We only need
          # libobs, so drop it from the build.
          sed -i '' 's|add_subdirectory(libobs-metal)||' obs-studio/CMakeLists.txt
          cmake -S obs-studio -B obs-build -G Xcode \
            -DCMAKE_PREFIX_PATH="$PWD/obs-deps" \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="-" \
            -DENABLE_UI=OFF -DENABLE_FRONTEND=OFF -DENABLE_PLUGINS=OFF \
            -DENABLE_BROWSER=OFF -DENABLE_SCRIPTING=OFF
          cmake --build obs-build --target libobs --config Release

      - name: Build plugin
        run: |
          cmake -S obs-plugin -B plugin-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror" \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_PREFIX_PATH="$PWD/obs-deps" \
            -DOBS_FRONTEND_API_HINT="$PWD/obs-studio/frontend/api;$PWD/obs-studio/UI/obs-frontend-api" \
            -DLIBOBS_INCLUDE_DIR="$PWD/obs-studio/libobs;$PWD/obs-build/config" \
            -DLIBOBS_LIBRARY="$PWD/obs-build/libobs/Release/libobs.framework" \
            -DFFMPEG_INCLUDE_DIR="$PWD/obs-deps/include" \
            -DAVCODEC_LIBRARY="$PWD/obs-deps/lib/libavcodec.dylib" \
            -DAVUTIL_LIBRARY="$PWD/obs-deps/lib/libavutil.dylib"
          cmake --build plugin-build

      # Assemble the .plugin bundle on PRs too, so a broken Info.plist or
      # layout change can't reach a release build. Takes seconds.
      - name: Package (drop into ~/Library/Application Support/obs-studio/plugins)
        run: |
          mkdir -p stage/lenslink.plugin/Contents/MacOS \
                   stage/lenslink.plugin/Contents/Resources
          cp plugin-build/lenslink.so stage/lenslink.plugin/Contents/MacOS/lenslink
          sed "s/@VERSION@/0.0.0/" installer/macos/Info.plist \
            > stage/lenslink.plugin/Contents/Info.plist
          plutil -lint stage/lenslink.plugin/Contents/Info.plist
          cp -R obs-plugin/data/ stage/lenslink.plugin/Contents/Resources/
          codesign --force --sign - --deep stage/lenslink.plugin

      # Two stages: pkgbuild makes the component, productbuild wraps it in
      # a distribution that installs to the *user's* home (see
      # installer/macos/distribution.xml for why that path is mandatory).
      - name: Build installer
        run: |
          mkdir -p pkgroot
          cp -R stage/lenslink.plugin pkgroot/
          pkgbuild --root pkgroot \
            --identifier com.lenslink.obs-plugin \
            --version 0.0.0 \
            --install-location "/Library/Application Support/obs-studio/plugins" \
            --component-plist installer/macos/component.plist \
            lenslink-component.pkg
          sed "s/@VERSION@/0.0.0/" installer/macos/distribution.xml > distribution.xml
          productbuild --distribution distribution.xml --package-path . \
            LensLink-installer-macos-universal.pkg

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v5
        with:
          name: lenslink-macos-universal
          path: |
            stage/
            LensLink-installer-macos-universal.pkg

  ios-app:
    name: iOS app (LensLink)
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    # Needs Xcode 16+: current XcodeGen emits project format 77, which
    # Xcode 15 (macos-14 runners) cannot open.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios-app

      # Unsigned device build packaged as an .ipa: proves every Swift
      # source compiles for the real platform, so a separate Simulator
      # build would just double the (10x-billed) macOS minutes. The .ipa
      # can't be installed as-is: sideload it with a tool that re-signs
      # with your Apple ID (Sideloadly / AltStore).
      - name: Build unsigned device IPA
        run: |
          set -o pipefail
          xcodebuild build \
            -project LensLink.xcodeproj \
            -scheme LensLink \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -R DerivedData/Build/Products/Release-iphoneos/LensLink.app Payload/
          zip -ry LensLink-unsigned.ipa Payload
        working-directory: ios-app

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v5
        with:
          name: LensLink-unsigned-ipa
          path: ios-app/LensLink-unsigned.ipa
