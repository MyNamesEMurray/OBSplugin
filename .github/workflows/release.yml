name: Release

# Push a version tag to publish a release with ready-to-install builds:
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ["v*"]
  # tag_name is required here too: without it a branch dispatch would run
  # all three builds and then skip publish (the gate below needs a tag).
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish the release under"
        required: true
        type: string
  workflow_call:
    inputs:
      tag_name:
        description: "Existing tag to publish the release under"
        required: true
        type: string

permissions:
  contents: write

jobs:
  plugin-linux:
    name: OBS plugin (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libobs-dev qt6-base-dev \
            libavcodec-dev libavutil-dev

      # The grep guard: the status-bar/dock UI degrades *silently* when Qt6
      # or obs-frontend-api.h is missing (that's how releases shipped
      # without it once) — a release build must fail instead.
      - name: Build
        run: |
          set -o pipefail
          cmake -B build -DCMAKE_BUILD_TYPE=Release | tee configure.log
          grep -q "frontend UI enabled" configure.log
          cmake --build build
        working-directory: obs-plugin

      - name: Package (extract into ~/.config/obs-studio/plugins)
        run: |
          mkdir -p stage/lenslink/bin/64bit stage/lenslink/data
          cp obs-plugin/build/lenslink.so stage/lenslink/bin/64bit/
          cp -r obs-plugin/data/* stage/lenslink/data/
          tar czf lenslink-linux-x86_64.tar.gz -C stage lenslink

      - uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: lenslink-linux-x86_64.tar.gz

  plugin-windows:
    name: OBS plugin (Windows)
    runs-on: windows-2022
    env:
      OBS_REF: "32.1.2"
      DEPS_TAG: "2025-08-23"
    steps:
      - uses: actions/checkout@v7

      # No submodules here: cache-hit runs only need in-tree headers
      # (libobs/, deps/w32-pthreads/); the recursive fetch runs only on a
      # cache miss, inside the build step.
      - name: Checkout obs-studio (for libobs)
        uses: actions/checkout@v7
        with:
          repository: obsproject/obs-studio
          ref: ${{ env.OBS_REF }}
          path: obs-studio

      - name: Download OBS prebuilt dependencies (FFmpeg, Qt6)
        run: |
          curl -L -o deps.zip "https://github.com/obsproject/obs-deps/releases/download/${{ env.DEPS_TAG }}/windows-deps-${{ env.DEPS_TAG }}-x64.zip"
          7z x deps.zip -oobs-deps
          # Qt6 (same bundle OBS itself builds with): needed only for the
          # plugin's status-bar/dock UI — keep in sync with build.yml.
          curl -L -o deps-qt6.zip "https://github.com/obsproject/obs-deps/releases/download/${{ env.DEPS_TAG }}/windows-deps-qt6-${{ env.DEPS_TAG }}-x64.zip"
          7z x -y deps-qt6.zip -oobs-deps

      - name: Cache libobs build
        id: cache-libobs
        uses: actions/cache@v6
        with:
          path: obs-build
          key: libobs-${{ env.OBS_REF }}-${{ env.DEPS_TAG }}

      - name: Build libobs
        if: steps.cache-libobs.outputs.cache-hit != 'true'
        run: |
          git -C obs-studio submodule update --init --recursive
          cmake -S obs-studio -B obs-build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}\obs-deps" `
            -DENABLE_UI=OFF -DENABLE_FRONTEND=OFF -DENABLE_PLUGINS=OFF `
            -DENABLE_BROWSER=OFF -DENABLE_SCRIPTING=OFF -DENABLE_WEBSOCKET=OFF `
            -DENABLE_AJA=OFF
          cmake --build obs-build --target libobs --config Release

      # The Select-String guard: the status-bar/dock UI degrades *silently*
      # when Qt6 or obs-frontend-api.h is missing (that's how releases
      # shipped without it once) — a release build must fail instead.
      - name: Build plugin
        run: |
          cmake -S obs-plugin -B plugin-build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}\obs-deps" `
            -DLIBOBS_INCLUDE_DIR="${{ github.workspace }}\obs-studio\libobs;${{ github.workspace }}\obs-build\config;${{ github.workspace }}\obs-studio\deps\w32-pthreads" `
            -DLIBOBS_LIBRARY="${{ github.workspace }}\obs-build\libobs\Release\obs.lib;${{ github.workspace }}\obs-build\deps\w32-pthreads\Release\w32-pthreads.lib" `
            -DOBS_FRONTEND_API_HINT="${{ github.workspace }}\obs-studio\frontend\api;${{ github.workspace }}\obs-studio\UI\obs-frontend-api" `
            -DFFMPEG_INCLUDE_DIR="${{ github.workspace }}\obs-deps\include" `
            -DAVCODEC_LIBRARY="${{ github.workspace }}\obs-deps\lib\avcodec.lib" `
            -DAVUTIL_LIBRARY="${{ github.workspace }}\obs-deps\lib\avutil.lib" `
            | Tee-Object -FilePath configure.log
          if (-not (Select-String -Quiet -SimpleMatch "frontend UI enabled" -Path configure.log)) {
            throw "status-bar/dock UI missing from this release build (Qt6/obs-frontend-api not found)"
          }
          cmake --build plugin-build --config Release

      - name: Package (extract into C:\Program Files\obs-studio)
        run: |
          New-Item -ItemType Directory -Force -Path stage\obs-plugins\64bit | Out-Null
          New-Item -ItemType Directory -Force -Path stage\data\obs-plugins\lenslink | Out-Null
          Copy-Item plugin-build\Release\lenslink.dll stage\obs-plugins\64bit\
          Copy-Item -Recurse obs-plugin\data\* stage\data\obs-plugins\lenslink\
          Compress-Archive -Path stage\* -DestinationPath lenslink-windows-x64.zip

      # One-click alternative to the zip: detects the OBS folder from the
      # registry and registers an uninstaller. Inno Setup is preinstalled
      # on the runner image; the guard covers image changes.
      - name: Build installer
        run: |
          if (-not (Get-Command iscc -ErrorAction SilentlyContinue)) {
            choco install innosetup -y --no-progress
          }
          $version = "${{ inputs.tag_name || github.ref_name }}".TrimStart("v")
          iscc /DAppVersion=$version installer\windows\lenslink.iss

      - uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: |
            lenslink-windows-x64.zip
            LensLink-installer-windows-x64.exe

  plugin-macos:
    name: OBS plugin (macOS)
    runs-on: macos-15
    env:
      OBS_REF: "32.1.2"
      DEPS_TAG: "2025-08-23"
    steps:
      - uses: actions/checkout@v7

      # No submodules here: cache-hit runs only need in-tree headers
      # (libobs/); the recursive fetch runs only on a cache miss, inside
      # the build step.
      - name: Checkout obs-studio (for libobs)
        uses: actions/checkout@v7
        with:
          repository: obsproject/obs-studio
          ref: ${{ env.OBS_REF }}
          path: obs-studio

      - name: Download OBS prebuilt dependencies (FFmpeg, Qt6)
        run: |
          curl -L -o deps.tar.xz "https://github.com/obsproject/obs-deps/releases/download/${{ env.DEPS_TAG }}/macos-deps-${{ env.DEPS_TAG }}-universal.tar.xz"
          mkdir obs-deps
          tar -xJf deps.tar.xz -C obs-deps
          # Qt6 for the status-bar/dock UI — keep in sync with build.yml.
          curl -L -o deps-qt6.tar.xz "https://github.com/obsproject/obs-deps/releases/download/${{ env.DEPS_TAG }}/macos-deps-qt6-${{ env.DEPS_TAG }}-universal.tar.xz"
          tar -xJf deps-qt6.tar.xz -C obs-deps

      # "macos" in the key: cache keys are not runner-scoped, and the
      # Windows job already uses libobs-<ref>-<tag> for its MSVC build.
      - name: Cache libobs build
        id: cache-libobs
        uses: actions/cache@v6
        with:
          path: obs-build
          key: libobs-macos-${{ env.OBS_REF }}-${{ env.DEPS_TAG }}

      # Xcode generator: obs-studio's macOS CMake requires it. Universal
      # (arm64 + x86_64) to match the deps bundle and the official OBS app.
      - name: Build libobs
        if: steps.cache-libobs.outputs.cache-hit != 'true'
        run: |
          git -C obs-studio submodule update --init --recursive
          # libobs-metal is a pure-Swift target added unconditionally on
          # macOS; without obs-studio's own presets the Swift language is
          # never enabled and CMake's generate step fails. We only need
          # libobs, so drop it from the build.
          sed -i '' 's|add_subdirectory(libobs-metal)||' obs-studio/CMakeLists.txt
          cmake -S obs-studio -B obs-build -G Xcode \
            -DCMAKE_PREFIX_PATH="$PWD/obs-deps" \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="-" \
            -DENABLE_UI=OFF -DENABLE_FRONTEND=OFF -DENABLE_PLUGINS=OFF \
            -DENABLE_BROWSER=OFF -DENABLE_SCRIPTING=OFF
          cmake --build obs-build --target libobs --config Release

      # The grep guard: the status-bar/dock UI degrades *silently* when Qt6
      # or obs-frontend-api.h is missing (that's how releases shipped
      # without it once) — a release build must fail instead.
      - name: Build plugin
        run: |
          set -o pipefail
          cmake -S obs-plugin -B plugin-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_PREFIX_PATH="$PWD/obs-deps" \
            -DOBS_FRONTEND_API_HINT="$PWD/obs-studio/frontend/api;$PWD/obs-studio/UI/obs-frontend-api" \
            -DLIBOBS_INCLUDE_DIR="$PWD/obs-studio/libobs;$PWD/obs-build/config" \
            -DLIBOBS_LIBRARY="$PWD/obs-build/libobs/Release/libobs.framework" \
            -DFFMPEG_INCLUDE_DIR="$PWD/obs-deps/include" \
            -DAVCODEC_LIBRARY="$PWD/obs-deps/lib/libavcodec.dylib" \
            -DAVUTIL_LIBRARY="$PWD/obs-deps/lib/libavutil.dylib" \
            | tee configure.log
          grep -q "frontend UI enabled" configure.log
          cmake --build plugin-build

      # Ad-hoc signature only: without an Apple Developer ID the bundle
      # can't be notarized, so users clear the quarantine flag once (the
      # release notes explain how).
      - name: Package (extract into ~/Library/Application Support/obs-studio/plugins)
        run: |
          version="${{ inputs.tag_name || github.ref_name }}"
          version="${version#v}"
          mkdir -p stage/lenslink.plugin/Contents/MacOS \
                   stage/lenslink.plugin/Contents/Resources
          cp plugin-build/lenslink.so stage/lenslink.plugin/Contents/MacOS/lenslink
          sed "s/@VERSION@/$version/" installer/macos/Info.plist \
            > stage/lenslink.plugin/Contents/Info.plist
          plutil -lint stage/lenslink.plugin/Contents/Info.plist
          cp -R obs-plugin/data/ stage/lenslink.plugin/Contents/Resources/
          codesign --force --sign - --deep stage/lenslink.plugin
          ditto -c -k --keepParent stage/lenslink.plugin lenslink-macos-universal.zip

      # One-click alternative to the zip: pkgbuild makes the component,
      # productbuild wraps it in a distribution that installs to the
      # *user's* OBS plugin folder (see installer/macos/distribution.xml
      # for why that path is mandatory on Apple Silicon).
      - name: Build installer
        run: |
          version="${{ inputs.tag_name || github.ref_name }}"
          version="${version#v}"
          mkdir -p pkgroot
          cp -R stage/lenslink.plugin pkgroot/
          pkgbuild --root pkgroot \
            --identifier com.lenslink.obs-plugin \
            --version "$version" \
            --install-location "/Library/Application Support/obs-studio/plugins" \
            --component-plist installer/macos/component.plist \
            lenslink-component.pkg
          sed "s/@VERSION@/$version/" installer/macos/distribution.xml > distribution.xml
          productbuild --distribution distribution.xml --package-path . \
            LensLink-installer-macos-universal.pkg

      - uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: |
            lenslink-macos-universal.zip
            LensLink-installer-macos-universal.pkg

  ios-app:
    name: iOS app (unsigned IPA)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: ios-app

      - name: Build unsigned device IPA
        run: |
          set -o pipefail
          xcodebuild build \
            -project LensLink.xcodeproj \
            -scheme LensLink \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -R DerivedData/Build/Products/Release-iphoneos/LensLink.app Payload/
          zip -ry LensLink-unsigned.ipa Payload
        working-directory: ios-app

      - uses: actions/upload-artifact@v7
        with:
          name: release-ipa
          path: ios-app/LensLink-unsigned.ipa

  publish:
    name: Publish release
    needs: [plugin-linux, plugin-windows, plugin-macos, ios-app]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag_name != ''
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/LensLink-installer-windows-x64.exe
            dist/lenslink-windows-x64.zip
            dist/LensLink-installer-macos-universal.pkg
            dist/lenslink-macos-universal.zip
            dist/lenslink-linux-x86_64.tar.gz
            dist/LensLink-unsigned.ipa
          body: |
            ## Installing

            **Windows (OBS plugin):** download and run
            `LensLink-installer-windows-x64.exe` — it finds your OBS Studio
            folder automatically. Then restart OBS. (Prefer doing it by
            hand? `lenslink-windows-x64.zip` extracts into
            `C:\Program Files\obs-studio\`.) Built against OBS Studio 32.x.

            **macOS (OBS plugin):** download and open
            `LensLink-installer-macos-universal.pkg` (right-click → Open the
            first time — the package is not notarized). It installs into
            your user OBS plugin folder
            (`~/Library/Application Support/obs-studio/plugins/`).
            Then restart OBS.
            Prefer doing it by hand? Extract `lenslink-macos-universal.zip`
            into `~/Library/Application Support/obs-studio/plugins/` and
            clear the quarantine flag:
            `xattr -dr com.apple.quarantine ~/Library/Application\ Support/obs-studio/plugins/lenslink.plugin`.
            Universal binary (Apple Silicon + Intel), macOS 13+, built
            against OBS Studio 32.x.

            **Linux (OBS plugin):** download `lenslink-linux-x86_64.tar.gz`
            and extract it into `~/.config/obs-studio/plugins/`.

            **iOS app:** easiest is the TestFlight beta —
            https://testflight.apple.com/join/N7Rth6m3 — which updates
            automatically.
            Alternatively, download `LensLink-unsigned.ipa` and sideload it
            with [Sideloadly](https://sideloadly.io) (Windows/macOS, free
            Apple ID; re-sign every 7 days).

            USB mode requires iTunes on Windows (for the Apple Mobile Device
            Service).
