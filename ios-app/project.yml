# XcodeGen project definition — run `xcodegen generate` in this directory
# to produce LensLink.xcodeproj. See BUILDING.md.
name: LensLink
options:
  bundleIdPrefix: com.exaltedpixels
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
  # Keep the generated project openable by older Xcode (14.x). If your
  # Xcode still complains about a "future project file format", generate
  # with XcodeGen 2.38.0 instead of the latest (see BUILDING.md).
  xcodeVersion: "14.2"

targets:
  LensLink:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      # Embeds the screen-mirror broadcast extension in the app bundle.
      - target: LensLinkBroadcast
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: LensLink
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Plain TCP on the local network, no custom crypto: pre-answers
        # App Store Connect's export-compliance question so TestFlight
        # builds are testable immediately instead of "Missing Compliance".
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        # All four orientations: App Store validation requires the full set
        # for iPad multitasking (or UIRequiresFullScreen, which we'd rather
        # not force).
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: >-
          LensLink streams your camera to OBS on your computer.
        NSLocalNetworkUsageDescription: >-
          LensLink connects to OBS Studio on your local network to send the
          camera feed.
        # Required for the NWBrowser that triggers the Local Network
        # permission dialog (browsing needs the service types declared;
        # advertising alone can be denied without iOS ever showing the
        # prompt or creating the Settings toggle).
        NSBonjourServices:
          - _lenslink._tcp
        NSMicrophoneUsageDescription: >-
          LensLink can send your microphone to OBS — as the camera's audio
          if you enable it, or purely as a timing reference to
          automatically sync your real microphone to the video.
        # lenslink://start / lenslink://stop — remote start via Shortcuts
        # automations (and anything else that can open a URL).
        CFBundleURLTypes:
          - CFBundleURLName: com.exaltedpixels.LensLinkCamera
            CFBundleURLSchemes:
              - lenslink
    settings:
      base:
        # Explicit (not derived from bundleIdPrefix): com.exaltedpixels.LensLink
        # is registered to another Apple account, so it can't be used.
        PRODUCT_BUNDLE_IDENTIFIER: com.exaltedpixels.LensLinkCamera
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1" # CI overrides with the run number
        # AppIntents (Siri shortcuts) is iOS 16+; the deployment target is
        # 15, so it must be weak-linked or the app won't launch on iOS 15.
        OTHER_LDFLAGS: "-weak_framework AppIntents"
        # Set your Apple Developer team to run on a device:
        # DEVELOPMENT_TEAM: XXXXXXXXXX

  # Screen mirroring: a ReplayKit broadcast-upload extension captures the
  # whole screen + system audio and streams it to the plugin over the same
  # wire protocol as the camera (so USB via usbmuxd works unchanged). It
  # shares the protocol/network/encoder code with the app.
  LensLinkBroadcast:
    type: app-extension
    platform: iOS
    sources:
      - BroadcastExtension
      - path: Sources/Protocol.swift
      - path: Sources/StreamClient.swift
      - path: Sources/VideoEncoder.swift
    info:
      path: BroadcastExtension/Info.plist
      properties:
        CFBundleDisplayName: LensLink Screen
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Needed so the extension can accept the plugin's LAN connection
        # over Wi-Fi (USB via usbmuxd doesn't require it).
        NSLocalNetworkUsageDescription: >-
          LensLink sends your screen to OBS Studio on your local network.
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SampleHandler
          RPBroadcastProcessMode: RPBroadcastProcessModeSampleBuffer
    settings:
      base:
        # Must be a child of the app's bundle id.
        PRODUCT_BUNDLE_IDENTIFIER: com.exaltedpixels.LensLinkCamera.broadcast
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1" # matched to the app by CI
