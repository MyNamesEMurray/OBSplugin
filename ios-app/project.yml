# XcodeGen project definition — run `xcodegen generate` in this directory
# to produce OBSCam.xcodeproj. See BUILDING.md.
name: OBSCam
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
  # Keep the generated project openable by older Xcode (14.x). If your
  # Xcode still complains about a "future project file format", generate
  # with XcodeGen 2.38.0 instead of the latest (see BUILDING.md).
  xcodeVersion: "14.2"

targets:
  OBSCam:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: OBSCam
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: >-
          OBSCam streams your camera to OBS on your computer.
        NSLocalNetworkUsageDescription: >-
          OBSCam connects to OBS Studio on your local network to send the
          camera feed.
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        # Set your Apple Developer team to run on a device:
        # DEVELOPMENT_TEAM: XXXXXXXXXX
