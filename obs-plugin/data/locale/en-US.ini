Settings.MenuItem="LensLink Settings"
Settings.Title="LensLink Settings"
Settings.GpuPipeline="GPU decode pipeline (beta)"
Settings.GpuPipeline.Note="Keeps decoded video on the graphics card instead of routing it through system memory — lower CPU use and latency, biggest gains at high resolutions. Applies to all LensLink sources after OBS restarts. If your system can't share textures (unusual GPU/driver setups), sources fall back to the standard pipeline automatically."
Settings.Web="Browser control panel (zoom/focus/exposure at the port below)"
Settings.WebPort="Panel port"
Settings.Diagnostics="Verbose diagnostics in the OBS log"
Settings.Dump="Dump received video to disk (troubleshooting)"
Settings.Benchmark="Log pipeline benchmark numbers every 5 s"
Settings.Benchmark.Tip="Writes a [lenslink][bench] line to the OBS log: per-frame video-path cost, pixel bytes crossing system memory, and OBS process CPU. Run the same scene with the GPU pipeline off and on to get comparable before/after numbers."
