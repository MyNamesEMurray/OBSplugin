HelpText="Open the LensLink app on your iPhone/iPad — with the app's 'Remote start from OBS' option on (the default), just having it open is enough; otherwise tap Start. Then either enter the phone's IP address (shown in the app) above with Connection set to Wi-Fi, or plug the phone in with a USB cable and set Connection to USB (needs iTunes on Windows)."
HelpTextScreen="In the LensLink app on your iPhone/iPad, tap 'Mirror screen to OBS', pick LensLink Screen, and Start Broadcast. Connect over Wi-Fi (enter the phone's IP above) or USB cable (needs iTunes on Windows). The phone's system audio comes along; DRM apps (Apple Music, Netflix) mute themselves during broadcasts."
