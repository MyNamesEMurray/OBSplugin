DeactivateHidden="Disconnect when this source isn't shown anywhere"
DeactivateHidden.Desc="When the source is hidden (eye icon off, or in no visible scene/preview/projector), disconnect from the phone so it stops encoding — saves the phone's battery and frees it for another LensLink source. Reconnects automatically when shown again. With auto-start enabled it also stops the phone's camera on hide and starts it again on show."
AutoStart="Start the phone's camera automatically when it's ready"
AutoStart.Desc="When the LensLink app is open and idle (its 'Remote start from OBS' option on), this source starts the camera by itself — no need to touch the phone. Turn off to start manually with the button below, the web panel, or on the phone."
